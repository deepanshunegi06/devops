name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Build Docker image
    - name: Build Docker image
      run: docker build -t devops-app:latest .

    # 4. Test container
    - name: Test container
      run: |
        docker run -d -p 80:80 --name test-app devops-app:latest
        sleep 3
        curl http://localhost:80
        docker stop test-app

    # 5. Login to Docker Hub
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # 6. Push to Docker Hub
    - name: Push to Docker Hub
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag devops-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    # Deploy to EC2 via SSH
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
          docker stop devops-app || true
          docker rm devops-app || true
          docker run -d --name devops-app -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest